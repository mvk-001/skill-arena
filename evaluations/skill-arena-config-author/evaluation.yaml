schemaVersion: 1
benchmark:
  id: skill-arena-compare
  description: Evaluate generation of compare configs covering workspace and skill source types, capability families, multiple adapters, assertion types, environment variables, and multi-profile scenarios.
  tags:
    - compare
    - skill
    - authoring
task:
  prompts:
    - id: sunday-brainstorming-compare-file
      description: Generate a compare.yaml for Sunday-only product brainstorming.
      prompt: >-
        I want a compare benchmark in `deliverables/compare.yaml` to check whether the
        remote brainstorming skill from
        https://github.com/obra/superpowers/tree/main/skills/brainstorming actually helps.
        The benchmark task should ask for ideas for a product that can only be sold on Sundays.
        Use the local fixture at `fixtures/brainstorming/base` as the workspace root and
        initialize git in the workspace.
        Compare a plain `no-skill` setup against a `skill` setup that pulls the skill from
        `https://github.com/obra/superpowers.git` on `main`, using `skills/brainstorming`
        as the selected skill with id `brainstorming`, installed as a workspace overlay.
        Run it with one `codex-mini` variant on Codex using model `gpt-5.1-codex-mini`,
        `codex` on PATH, danger-full-access sandboxing, no approvals, web search off,
        network on, low reasoning, and label it `codex mini`.
        Return only the YAML.
      evaluation:
        assertions:
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const promptSection = normalized.match(/^task:\n([\s\S]*?)(?=^workspace:\s*$)/m)?.[1] ?? "";
              const promptText = promptSection.toLowerCase();
              return (promptSection.match(/^\s+- id:\s+/gm) ?? []).length >= 1
                && /sunday/.test(promptText)
                && /product/.test(promptText)
                && /brainstorm/.test(promptText)
                && /(only be sold on sundays|sunday-only)/.test(promptText)
                && /skills\/brainstorming/.test(normalized);
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              return /^schemaVersion:\s*1(?:\n|$)/.test(normalized)
                && /skills\/brainstorming/.test(normalized)
                && !/^```/m.test(normalized)
                && !/^#/m.test(normalized)
                && normalized.trim().startsWith("schemaVersion:");
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const comparisonSection = normalized.match(/^comparison:\n([\s\S]*)$/m)?.[1] ?? "";
              return /^\s+- id:\s+codex-mini\s*$/m.test(normalized)
                && /^\s+adapter:\s+codex\s*$/m.test(normalized)
                && /^\s+model:\s+gpt-5\.1-codex-mini\s*$/m.test(normalized)
                && /^\s+sandboxMode:\s+danger-full-access\s*$/m.test(normalized)
                && /^\s+webSearchEnabled:\s+false\s*$/m.test(normalized)
                && /^\s+networkAccessEnabled:\s+true\s*$/m.test(normalized)
                && /^\s+executionMethod:\s+command\s*$/m.test(normalized)
                && /^\s+commandPath:\s+codex\s*$/m.test(normalized)
                && /^\s+variantDisplayName:\s+codex mini\s*$/m.test(normalized)
                && /^\s+repo:\s+https:\/\/github\.com\/obra\/superpowers(?:\.git)?\s*$/m.test(normalized)
                && /^\s+ref:\s+main\s*$/m.test(normalized)
                && /^\s+skillPath:\s+skills\/brainstorming\s*$/m.test(normalized)
                && /^\s+skillId:\s+brainstorming\s*$/m.test(normalized)
                && /^\s+strategy:\s+workspace-overlay\s*$/m.test(normalized)
                && /^\s+- id:\s+skill\s*$/m.test(comparisonSection)
                && /^\s+skills:\s*$/m.test(comparisonSection)
                && !/^\s+(agents|extensions|hooks|mcp|plugins):\s*$/m.test(comparisonSection);
    - id: sunday-brainstorming-compare-jurisdiction
      description: Generate a complete compare.yaml with isolated profiles.
      prompt: >-
        Please draft `deliverables/compare.yaml` for the remote brainstorming skill at
        https://github.com/obra/superpowers/tree/main/skills/brainstorming.
        I only need a clean side-by-side comparison between an isolated `no-skill` profile
        and an isolated `skill` profile, with the skill coming from git and being mounted
        into the workspace rather than treated as system-installed.
        Return only valid YAML.
      evaluation:
        assertions:
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const comparisonSection = normalized.match(/^comparison:\n([\s\S]*)$/m)?.[1] ?? "";
              const profileIds = Array.from(
                comparisonSection.matchAll(/^\s+- id:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              return /^\s+profiles:\s*$/m.test(normalized)
                && profileIds.includes("no-skill")
                && profileIds.includes("skill")
                && profileIds.length === 2
                && /^\s+inheritSystem:\s+false\s*$/m.test(comparisonSection)
                && /^\s+capabilities:\s+\{\}\s*$/m.test(comparisonSection)
                && /^\s+skills:\s*$/m.test(comparisonSection)
                && /^\s+type:\s+git\s*$/m.test(comparisonSection)
                && /^\s+repo:\s+https:\/\/github\.com\/obra\/superpowers(?:\.git)?\s*$/m.test(comparisonSection)
                && /^\s+ref:\s+main\s*$/m.test(comparisonSection)
                && /^\s+skillPath:\s+skills\/brainstorming\s*$/m.test(comparisonSection)
                && /^\s+skillId:\s+brainstorming\s*$/m.test(comparisonSection)
                && /^\s+strategy:\s+workspace-overlay\s*$/m.test(comparisonSection);
    - id: sunday-brainstorming-compare-multi-prompt
      description: Generate a compare.yaml that exercises prompt matrices and prompt-specific assertions.
      prompt: >-
        I need `deliverables/compare.yaml` for the brainstorming skill at
        https://github.com/obra/superpowers/tree/main/skills/brainstorming.
        Make this benchmark realistic by checking two user requests about Sunday-only product ideas:
        one should expect a Markdown answer and the other a JSON answer.
        Keep them as two separate prompt rows and use row-specific assertions so the config
        can tell the two output formats apart.
        Return only valid YAML.
      evaluation:
        assertions:
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const promptSection = normalized.match(/^task:\n([\s\S]*?)(?=^workspace:\s*$)/m)?.[1] ?? "";
              const promptCount = (promptSection.match(/^\s+- id:\s+/gm) ?? []).length;
              const hasJsonPrompt =
                /-\s+id:\s+[^\n]*json[\s\S]*?type:\s+is-json\b/i.test(promptSection)
                || /\bjson\b[\s\S]*?type:\s+is-json\b/i.test(promptSection);
              const hasMarkdownPrompt =
                /-\s+id:\s+[^\n]*markdown[\s\S]*?type:\s+regex\b/i.test(promptSection)
                || /\bmarkdown\b[\s\S]*?type:\s+regex\b/i.test(promptSection);
              return promptCount === 2
                && hasJsonPrompt
                && hasMarkdownPrompt
                && !/type:\s+is-json\b[\s\S]*?\bmarkdown\b/i.test(promptSection);
    - id: local-skill-with-env
      description: Generate a compare.yaml with a local-path skill, two variants, and workspace env using $WORKSPACE.
      prompt: >-
        Build `deliverables/compare.yaml` for a benchmark called `local-env-bench`.
        I want to compare a local skill bundle stored at `fixtures/my-skill/overlay`
        with skill id `my-skill` against a no-skill control, using `fixtures/my-skill/base`
        as the workspace.
        The benchmark should also model environment-dependent tools: set
        `workspace.setup.env.TOOL_CONFIG` to `$WORKSPACE/config/tool.json`, and for the
        Codex variant also set `cliEnv.DATA_DIR` to `$WORKSPACE/data`.
        Use one prompt asking for a repository summary.
        Include two variants, `codex-mini` on Codex with `gpt-5.1-codex-mini`
        and `pi-mini` on Pi with `github-copilot/gpt-5-mini`.
        Return only valid YAML.
      evaluation:
        assertions:
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const comparisonSection = normalized.match(/^comparison:\n([\s\S]*)$/m)?.[1] ?? "";
              const workspaceSection = normalized.match(/^workspace:\n([\s\S]*?)(?=^evaluation:\s*$)/m)?.[1] ?? "";
              const profileIds = Array.from(
                (comparisonSection.match(/^\s+profiles:\s*$/m) ? comparisonSection.split(/^\s+variants:\s*$/m)[0] : "").matchAll(/^\s+- id:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const variantIds = Array.from(
                (comparisonSection.match(/^\s+variants:\s*$/m) ? comparisonSection.split(/^\s+variants:\s*$/m)[1] ?? "" : "").matchAll(/^\s+- id:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const hasCodexVariant = variantIds.includes("codex-mini");
              const hasPiVariant = variantIds.includes("pi-mini");
              const hasLocalPathSkill = /type:\s+local-path\b/.test(comparisonSection)
                && /skillId:\s+my-skill\b/.test(comparisonSection)
                && /strategy:\s+workspace-overlay\b/.test(comparisonSection);
              const hasWorkspaceBase = /type:\s+local-path\b[\s\S]*?path:\s+fixtures\/my-skill\/base\b[\s\S]*?target:\s+\//m.test(workspaceSection);
              const hasWorkspaceEnv = /\$WORKSPACE\/config\/tool\.json/.test(workspaceSection)
                || /\$\{WORKSPACE\}\/config\/tool\.json/.test(workspaceSection);
              const hasCliEnv = /\$WORKSPACE\/data/.test(comparisonSection)
                || /\$\{WORKSPACE\}\/data/.test(comparisonSection);
              const hasAdapterPi = /adapter:\s+pi\b/.test(comparisonSection);
              const hasAdapterCodex = /adapter:\s+codex\b/.test(comparisonSection);
              const hasExpectedProfiles = profileIds.includes("no-skill")
                && profileIds.includes("skill")
                && profileIds.length === 2;
              const hasExpectedVariants = hasCodexVariant
                && hasPiVariant
                && variantIds.length === 2;
              return hasCodexVariant
                && hasExpectedVariants
                && hasExpectedProfiles
                && hasLocalPathSkill
                && hasWorkspaceBase
                && hasWorkspaceEnv
                && hasCliEnv
                && hasAdapterPi
                && hasAdapterCodex;
    - id: inline-skill-copilot-judge
      description: Generate a compare.yaml with an inline-files skill, a copilot-cli variant, and llm-rubric with local judge.
      prompt: >-
        Put together `deliverables/compare.yaml` for a small benchmark called
        `inline-copilot-bench`.
        I want the skill embedded directly in the config as a tiny greeter bundle that creates
        `skills/greeter/SKILL.md`, uses skill id `greeter`, and tells the agent to greet warmly.
        Use `fixtures/inline-copilot/base` as the workspace and a single prompt where the user
        asks for a greeting.
        Judge it with a shared local `llm-rubric` using `skill-arena:judge:copilot-cli`,
        plus a simple shared check that the output contains `hello`.
        Run it with one `copilot-mini` variant on `copilot`, model `gpt-5.4-mini`,
        command execution, workspace-write sandboxing, and network disabled.
        Return only valid YAML.
      evaluation:
        assertions:
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const workspaceSection = normalized.match(/^workspace:\n([\s\S]*?)(?=^evaluation:\s*$)/m)?.[1] ?? "";
              const comparisonSection = normalized.match(/^comparison:\n([\s\S]*)$/m)?.[1] ?? "";
              const evaluationSection = normalized.match(/^evaluation:\n([\s\S]*?)(?=^comparison:\s*$)/m)?.[1] ?? "";
              const profileIds = Array.from(
                (comparisonSection.match(/^\s+profiles:\s*$/m) ? comparisonSection.split(/^\s+variants:\s*$/m)[0] : "").matchAll(/^\s+- id:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const variantIds = Array.from(
                (comparisonSection.match(/^\s+variants:\s*$/m) ? comparisonSection.split(/^\s+variants:\s*$/m)[1] ?? "" : "").matchAll(/^\s+- id:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const hasInlineFiles = /type:\s+inline-files\b/.test(comparisonSection);
              const hasSkillMd = /skills\/greeter\/SKILL\.md/.test(comparisonSection);
              const hasGreeterSkillId = /skillId:\s+greeter\b/.test(comparisonSection)
                || /skills\/greeter/.test(comparisonSection);
              const hasOverlay = /strategy:\s+workspace-overlay\b/.test(comparisonSection);
              const hasCopilotAdapter = /adapter:\s+copilot-cli\b/.test(comparisonSection);
              const hasCopilotModel = /model:\s+gpt-5\.4-mini\b/.test(comparisonSection);
              const hasWorkspaceWrite = /sandboxMode:\s+workspace-write\b/.test(comparisonSection);
              const hasJudge = /provider:\s+skill-arena:judge:copilot-cli\b/.test(evaluationSection);
              const hasLlmRubric = /type:\s+llm-rubric\b/.test(evaluationSection);
              const hasContains = /type:\s+contains\b/.test(evaluationSection);
              const hasNetworkFalse = /networkAccessEnabled:\s+false\b/.test(comparisonSection);
              const hasExpectedProfiles = profileIds.includes("no-skill")
                && profileIds.includes("skill")
                && profileIds.length === 2;
              const hasExpectedVariants = variantIds.includes("copilot-mini")
                && variantIds.length === 1;
              const workspaceSourceTypes = Array.from(
                workspaceSection.matchAll(/^\s+- (?:id:\s+[^\n]+\n\s+)?type:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const hasExpectedWorkspace = workspaceSourceTypes.length === 1
                && workspaceSourceTypes[0] === "local-path"
                && /path:\s+fixtures\/inline-copilot\/base\b/.test(workspaceSection);
              const sharedAssertionTypes = Array.from(
                evaluationSection.matchAll(/^\s+- type:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const hasExpectedSharedAssertions = sharedAssertionTypes.includes("llm-rubric")
                && sharedAssertionTypes.includes("contains");
              return hasInlineFiles
                && hasSkillMd
                && hasGreeterSkillId
                && hasOverlay
                && hasCopilotAdapter
                && hasCopilotModel
                && hasWorkspaceWrite
                && hasJudge
                && hasLlmRubric
                && hasContains
                && hasNetworkFalse
                && hasExpectedProfiles
                && hasExpectedVariants
                && hasExpectedWorkspace
                && hasExpectedSharedAssertions;
    - id: multi-profile-file-contains
      description: Generate a compare.yaml with three profiles and a file-contains assertion.
      prompt: >-
        Please create `deliverables/compare.yaml` for a benchmark called `three-profile-bench`.
        The workspace should come from `fixtures/three-profile/base`.
        The task should ask the agent to write a summary into `output/summary.txt`, and the
        shared evaluation should verify that file contains the word `complete`.
        I want three profiles: a plain `baseline`, one using the local analyzer skill from
        `fixtures/skills/analyzer`, and another using the local reporter skill from
        `fixtures/skills/reporter`. Use skill ids `analyzer` and `reporter`.
        Run everything with a single `codex-mini` variant on `gpt-5.1-codex-mini`
        and workspace-write sandboxing.
        Return only valid YAML.
      evaluation:
        assertions:
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const workspaceSection = normalized.match(/^workspace:\n([\s\S]*?)(?=^evaluation:\s*$)/m)?.[1] ?? "";
              const comparisonSection = normalized.match(/^comparison:\n([\s\S]*)$/m)?.[1] ?? "";
              const evaluationSection = normalized.match(/^evaluation:\n([\s\S]*?)(?=^comparison:\s*$)/m)?.[1] ?? "";
              const profileIds = Array.from(
                (comparisonSection.match(/^\s+profiles:\s*$/m) ? comparisonSection.split(/^\s+variants:\s*$/m)[0] : "").matchAll(/^\s+- id:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const variantIds = Array.from(
                (comparisonSection.match(/^\s+variants:\s*$/m) ? comparisonSection.split(/^\s+variants:\s*$/m)[1] ?? "" : "").matchAll(/^\s+- id:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const hasThreeProfiles = profileIds.includes("baseline")
                && profileIds.includes("skill-a")
                && profileIds.includes("skill-b")
                && profileIds.length === 3;
              const hasFileContains = /type:\s+file-contains\b/.test(evaluationSection);
              const hasOutputPath = /path:\s+output\/summary\.txt\b/.test(evaluationSection)
                || /output\/summary\.txt/.test(evaluationSection);
              const hasContainsComplete = /complete/.test(evaluationSection);
              const hasAnalyzerSkill = /skillId:\s+analyzer\b/.test(comparisonSection)
                && /fixtures\/skills\/analyzer/.test(comparisonSection);
              const hasReporterSkill = /skillId:\s+reporter\b/.test(comparisonSection)
                && /fixtures\/skills\/reporter/.test(comparisonSection);
              const hasWorkspaceWrite = /sandboxMode:\s+workspace-write\b/.test(comparisonSection);
              const hasBothOverlays = (comparisonSection.match(/strategy:\s+workspace-overlay\b/g) ?? []).length >= 2;
              const hasBaselineEmpty = /- id:\s+baseline[\s\S]*?capabilities:\s+\{\}/m.test(comparisonSection);
              const workspaceSourceTypes = Array.from(
                workspaceSection.matchAll(/^\s+- (?:id:\s+[^\n]+\n\s+)?type:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const hasExpectedWorkspace = workspaceSourceTypes.length === 1
                && workspaceSourceTypes[0] === "local-path"
                && /path:\s+fixtures\/three-profile\/base\b/.test(workspaceSection);
              const hasExpectedVariant = variantIds.includes("codex-mini") && variantIds.length === 1;
              return hasThreeProfiles
                && hasFileContains
                && hasOutputPath
                && hasContainsComplete
                && hasAnalyzerSkill
                && hasReporterSkill
                && hasWorkspaceWrite
                && hasBothOverlays
                && hasBaselineEmpty
                && hasExpectedWorkspace
                && hasExpectedVariant;
    - id: copilot-inline-skill-with-capability-bundles
      description: Generate a compare.yaml with an inline skill plus copilot instructions, agents, hooks, and deterministic assertions.
      prompt: >-
        I need `deliverables/compare.yaml` for a benchmark called `copilot-capability-bench`.
        Think of it as a realistic repo setup where the Copilot profile gets more than just a skill:
        it should also receive project instructions from `fixtures/copilot-capability/instructions`,
        custom hooks from `fixtures/copilot-capability/hooks`, and one inline custom agent with id
        `triage-helper` placed under `/.github/agents`.
        The same profile should also include a tiny inline skill with id `formatter` whose guidance is
        `Always answer DONE.`.
        Use `fixtures/copilot-capability/base` as the workspace, one prompt asking for exactly `DONE`,
        and shared checks for exact match `DONE` plus a case-insensitive `done`.
        Use a single `copilot-mini` variant on `copilot`, model `gpt-5.4-mini`,
        workspace-write sandboxing, no approvals, no web, no network, and label it `copilot mini`.
        Return only valid YAML.
      evaluation:
        assertions:
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const comparisonSection = normalized.match(/^comparison:\n([\s\S]*)$/m)?.[1] ?? "";
              const evaluationSection = normalized.match(/^evaluation:\n([\s\S]*?)(?=^comparison:\s*$)/m)?.[1] ?? "";
              const profileIds = Array.from(
                (comparisonSection.match(/^\s+profiles:\s*$/m) ? comparisonSection.split(/^\s+variants:\s*$/m)[0] : "").matchAll(/^\s+- id:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const variantIds = Array.from(
                (comparisonSection.match(/^\s+variants:\s*$/m) ? comparisonSection.split(/^\s+variants:\s*$/m)[1] ?? "" : "").matchAll(/^\s+- id:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const hasInlineSkill = /skills:\s*[\s\S]*?type:\s+inline\b[\s\S]*?skillId:\s+formatter\b/m.test(comparisonSection);
              const hasInstructions = /instructions:\s*[\s\S]*?type:\s+local-path\b[\s\S]*?fixtures\/copilot-capability\/instructions[\s\S]*?target:\s+\//m.test(comparisonSection);
              const hasAgents = /agents:\s*[\s\S]*?type:\s+inline-files\b[\s\S]*?target:\s+\/\.github\/agents[\s\S]*?agentId:\s+triage-helper\b/m.test(comparisonSection);
              const hasHooks = /hooks:\s*[\s\S]*?type:\s+local-path\b[\s\S]*?fixtures\/copilot-capability\/hooks[\s\S]*?target:\s+\/\.github\/hooks/m.test(comparisonSection);
              const hasCopilotVariant = /adapter:\s+copilot-cli\b/.test(comparisonSection)
                && /commandPath:\s+copilot\b/.test(comparisonSection)
                && /variantDisplayName:\s+copilot mini\b/.test(comparisonSection);
              const hasEquals = /type:\s+equals\b[\s\S]*?value:\s+DONE\b/m.test(evaluationSection);
              const hasIcontains = /type:\s+icontains\b[\s\S]*?value:\s+done\b/m.test(evaluationSection);
              const hasExpectedProfiles = profileIds.includes("no-skill")
                && profileIds.includes("copilot-bundle")
                && profileIds.length === 2;
              const hasExpectedVariants = variantIds.includes("copilot-mini")
                && variantIds.length === 1;
              return hasInlineSkill
                && hasInstructions
                && hasAgents
                && hasHooks
                && hasCopilotVariant
                && hasEquals
                && hasIcontains
                && hasExpectedProfiles
                && hasExpectedVariants;
    - id: opencode-git-workspace-with-empty-source
      description: Generate a compare.yaml with git and empty workspace sources plus opencode agent capabilities.
      prompt: >-
        Draft `deliverables/compare.yaml` for a benchmark named `opencode-git-bench`.
        I want this one to look like a repo pulled from git, so the workspace should start from
        `https://github.com/example/repo.git` on `main`, narrowed to `fixtures/base`, mounted at `/`.
        Also include an explicit empty source mounted at `/scratch` so the config shows that area starts blank.
        The user task should ask for a Markdown architecture summary.
        Compare a plain `no-skill` profile against an `opencode-agent` profile that receives project
        instructions from `fixtures/opencode/instructions` and a custom agent with id `reviewer`
        from `fixtures/opencode/agents` mounted under `/.opencode/agents`.
        Run it with one `opencode-mini` variant on the `opencode` CLI, model `gpt-5-mini`,
        command execution, workspace-write sandboxing, no approvals, no web, no network,
        low reasoning, and label it `opencode mini`.
        Return only valid YAML.
      evaluation:
        assertions:
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const workspaceSection = normalized.match(/^workspace:\n([\s\S]*?)(?=^evaluation:\s*$)/m)?.[1] ?? "";
              const comparisonSection = normalized.match(/^comparison:\n([\s\S]*)$/m)?.[1] ?? "";
              const profileIds = Array.from(
                (comparisonSection.match(/^\s+profiles:\s*$/m) ? comparisonSection.split(/^\s+variants:\s*$/m)[0] : "").matchAll(/^\s+- id:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const variantIds = Array.from(
                (comparisonSection.match(/^\s+variants:\s*$/m) ? comparisonSection.split(/^\s+variants:\s*$/m)[1] ?? "" : "").matchAll(/^\s+- id:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const hasGitWorkspace = /type:\s+git\b[\s\S]*?repo:\s+https:\/\/github\.com\/example\/repo\.git\b[\s\S]*?ref:\s+main\b[\s\S]*?subpath:\s+fixtures\/base\b[\s\S]*?target:\s+\//m.test(workspaceSection);
              const hasEmptyWorkspace = /type:\s+empty\b[\s\S]*?target:\s+\/scratch\b/m.test(workspaceSection);
              const workspaceSourceTypes = Array.from(
                workspaceSection.matchAll(/^\s+- (?:id:\s+[^\n]+\n\s+)?type:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const hasInstructions = /instructions:\s*[\s\S]*?fixtures\/opencode\/instructions[\s\S]*?target:\s+\//m.test(comparisonSection);
              const hasAgents = /agents:\s*[\s\S]*?fixtures\/opencode\/agents[\s\S]*?target:\s+\/\.opencode\/agents[\s\S]*?agentId:\s+reviewer\b/m.test(comparisonSection);
              const hasOpencodeVariant = /adapter:\s+opencode\b/.test(comparisonSection)
                && /commandPath:\s+opencode\b/.test(comparisonSection)
                && /variantDisplayName:\s+opencode mini\b/.test(comparisonSection);
              const hasExpectedProfiles = profileIds.includes("no-skill")
                && profileIds.includes("opencode-agent")
                && profileIds.length === 2;
              const hasExpectedVariants = variantIds.includes("opencode-mini")
                && variantIds.length === 1;
              return hasGitWorkspace
                && hasEmptyWorkspace
                && workspaceSourceTypes.length === 2
                && hasInstructions
                && hasAgents
                && hasOpencodeVariant
                && hasExpectedProfiles
                && hasExpectedVariants;
    - id: system-installed-and-unsupported-capability-families
      description: Generate a compare.yaml that preserves system-installed skills and unsupported capability families explicitly.
      prompt: >-
        Please prepare `deliverables/compare.yaml` for a benchmark called `system-installed-bench`.
        Use `fixtures/system-installed/base` as the workspace and make the task ask which capability
        families are active in the environment.
        I want to compare five profiles: a plain `no-skill` control, one profile that relies on a
        system-installed skill, one that injects MCP files, one that injects extensions, and one that
        injects plugins.
        Model the system skill explicitly as system-installed, put the MCP bundle under `/.codex/mcp`
        from inline files, load extensions from `fixtures/system-installed/extensions` into
        `/.pi/extensions`, and load plugins from `https://github.com/example/plugins.git` on `main`,
        narrowed to `plugins/bundle`, into `/.opencode/plugins`.
        Use one `codex-mini` variant on Codex with `gpt-5.1-codex-mini`, command execution,
        read-only sandboxing, no approvals, no web, no network, low reasoning, and label it
        `codex mini`.
        Return only valid YAML.
      evaluation:
        assertions:
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const comparisonSection = normalized.match(/^comparison:\n([\s\S]*)$/m)?.[1] ?? "";
              const profileIds = Array.from(
                comparisonSection.matchAll(/^\s+- id:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const hasSystemInstalled = /- id:\s+system-skill[\s\S]*?skills:\s*[\s\S]*?type:\s+system-installed\b[\s\S]*?strategy:\s+system-installed\b/m.test(comparisonSection);
              const hasMcp = /- id:\s+mcp-bundle[\s\S]*?mcp:\s*[\s\S]*?type:\s+inline-files\b[\s\S]*?target:\s+\/\.codex\/mcp\b/m.test(comparisonSection);
              const hasExtensions = /- id:\s+extension-bundle[\s\S]*?extensions:\s*[\s\S]*?type:\s+local-path\b[\s\S]*?fixtures\/system-installed\/extensions[\s\S]*?target:\s+\/\.pi\/extensions\b/m.test(comparisonSection);
              const hasPlugins = /- id:\s+plugin-bundle[\s\S]*?plugins:\s*[\s\S]*?type:\s+git\b[\s\S]*?repo:\s+https:\/\/github\.com\/example\/plugins\.git\b[\s\S]*?subpath:\s+plugins\/bundle\b[\s\S]*?target:\s+\/\.opencode\/plugins\b/m.test(comparisonSection);
              const hasVariant = /adapter:\s+codex\b/.test(comparisonSection)
                && /model:\s+gpt-5\.1-codex-mini\b/.test(comparisonSection)
                && /commandPath:\s+codex\b/.test(comparisonSection)
                && /sandboxMode:\s+read-only\b/.test(comparisonSection)
                && /variantDisplayName:\s+codex mini\b/.test(comparisonSection);
              const hasExpectedProfiles = [
                "no-skill",
                "system-skill",
                "mcp-bundle",
                "extension-bundle",
                "plugin-bundle",
              ].every((id) => profileIds.includes(id)) && profileIds.length === 5;
              return hasSystemInstalled
                && hasExpectedProfiles
                && hasMcp
                && hasExtensions
                && hasPlugins
                && hasVariant;
workspace:
  sources:
    - id: base
      type: local-path
      path: evaluations/skill-arena-config-author/fixtures/workspaces/base
      target: /
  setup:
    initializeGit: true
    env: {}
evaluation:
  assertions:
    - type: regex
      value: "^schemaVersion:\\s*1(?:\\r?\\n|$)"
    - type: javascript
      value: |
        const normalized = output.replace(/\r\n/g, "\n");
        const topLevelKeys = Array.from(
          normalized.matchAll(/^([A-Za-z][A-Za-z0-9-]*):/gm),
          (match) => match[1],
        );
        const workspaceSection = normalized.match(/^workspace:\n([\s\S]*?)(?=^evaluation:\s*$)/m)?.[1] ?? "";
        const sourceTypes = Array.from(
          workspaceSection.matchAll(/^\s+- (?:id:\s+[^\n]+\n\s+)?type:\s+([A-Za-z0-9-]+)\s*$/gm),
          (match) => match[1],
        );
        const localPaths = Array.from(
          workspaceSection.matchAll(/^\s+path:\s+([^\n]+)\s*$/gm),
          (match) => match[1].trim(),
        );
        const hasWorkspaceSources = /^\s+sources:\s*$/m.test(workspaceSection) && sourceTypes.length >= 1;
        const hasOnlyRuntimeRelativeLocalPaths = localPaths.every((value) => !/^([A-Za-z]:[\\/]|\/)/.test(value));
        const evaluationSection = normalized.match(/^evaluation:\n([\s\S]*?)(?=^comparison:\s*$)/m)?.[1] ?? "";
        const comparisonSection = normalized.match(/^comparison:\n([\s\S]*)$/m)?.[1] ?? "";
        const forbiddenPatterns = [
          /^\s*```[A-Za-z0-9-]*\s*$/m,
          /^task:\n  prompts:\n    [\w-]+:\s*$/m,
          /^\s+shared:\s*$/m,
          /^\s+enabled:\s+(true|false)\s*$/m,
          /^\s+template:\s*[|>]/m,
          /^\s+instructions:\s*[|>]/m,
          /^\s+responseFormat:\s*$/m,
          /^\s+text:\s*[|>]/m,
          /^\s+pattern:\s+/m,
          /^\s+rubric:\s*[|>]/m,
        ];
        return JSON.stringify(topLevelKeys) === JSON.stringify([
          "schemaVersion",
          "benchmark",
          "task",
          "workspace",
          "evaluation",
          "comparison",
        ])
          && /^task:\n  prompts:\n    - id:\s+[\w-]+/m.test(normalized)
          && hasWorkspaceSources
          && hasOnlyRuntimeRelativeLocalPaths
          && /^evaluation:\n  assertions:\n/m.test(normalized)
          && /^\s+requests:\s+\d+\s*$/m.test(evaluationSection)
          && /^\s+capabilities:\s+\{\}\s*$/m.test(normalized)
          && /^\s+profiles:\s*$/m.test(normalized)
          && /^\s+variants:\s*$/m.test(normalized)
          && /^\s+inheritSystem:\s+false\s*$/m.test(comparisonSection)
          && !/comparison:\n  skillModes:/m.test(normalized)
          && !/^\s+-\s+local-path:\s*$/m.test(normalized)
          && !/^\s+approval:\s+/m.test(comparisonSection)
          && forbiddenPatterns.every((pattern) => !pattern.test(normalized));
  requests: 8
  timeoutMs: 1200000
  tracing: false
  maxConcurrency: 8
  noCache: true
comparison:
  profiles:
    - id: no-skill
      description: Fully isolated baseline without the brainstorming skill.
      isolation:
        inheritSystem: false
      capabilities: {}
    - id: skill
      description: Compare-authoring profile with only the local skill-arena-config-author skill enabled.
      isolation:
        inheritSystem: false
      capabilities:
        skills:
          - source:
              type: local-path
              path: skills/skill-arena-config-author
              skillId: skill-arena-config-author
            install:
              strategy: workspace-overlay
      output:
        tags:
          - skill
        labels:
          skillDisplayName: skill
          skillModeId: skill
  variants:
    - id: codex-mini
      description: gpt-5.1-codex-mini authoring variant.
      agent:
        adapter: codex
        model: gpt-5.1-codex-mini
        executionMethod: command
        commandPath: codex
        sandboxMode: danger-full-access
        approvalPolicy: never
        webSearchEnabled: false
        networkAccessEnabled: true
        reasoningEffort: low
        additionalDirectories: []
        cliEnv: {}
        config: {}
      output:
        tags:
          - codex
          - mini
        labels:
          variantDisplayName: codex mini
