schemaVersion: 1
benchmark:
  id: skill-arena-compare
  description: Evaluate generation of compare configs covering git, local-path, and inline-files skill sources, multiple adapters, assertion types, environment variables, and multi-profile scenarios.
  tags:
    - compare
    - skill
    - authoring
task:
  prompts:
    - id: sunday-brainstorming-compare-file
      description: Generate a compare.yaml for Sunday-only product brainstorming.
      prompt: >-
        Create `deliverables/compare.yaml` for this remote skill:
        https://github.com/obra/superpowers/tree/main/skills/brainstorming.
        The task inside the generated compare must ask the model to brainstorm ideas for
        a product that can only be sold on Sundays.
        Use a workspace source with type `local-path`, path `fixtures/brainstorming/base`,
        and target `/`. Set `workspace.setup.initializeGit` to true.
        Use profiles `no-skill` and `skill`. Use one variant `codex-mini` with
        adapter `codex`, model `gpt-5.1-codex-mini`, executionMethod `command`,
        commandPath `codex`, sandboxMode `danger-full-access`, approvalPolicy `never`,
        webSearchEnabled `false`, networkAccessEnabled `true`, reasoningEffort `low`,
        and variantDisplayName `codex mini`.
        The skill source must use type `git` with repo `https://github.com/obra/superpowers.git`,
        ref `main`, skillPath `skills/brainstorming`, skillId `brainstorming`, and
        install strategy `workspace-overlay`.
        Return only the final YAML.
      evaluation:
        assertions:
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const promptSection = normalized.match(/^task:\n([\s\S]*?)(?=^workspace:\s*$)/m)?.[1] ?? "";
              const promptText = promptSection.toLowerCase();
              return (promptSection.match(/^\s+- id:\s+/gm) ?? []).length >= 1
                && /sunday/.test(promptText)
                && /product/.test(promptText)
                && /brainstorm/.test(promptText)
                && /(only be sold on sundays|sunday-only)/.test(promptText)
                && /skills\/brainstorming/.test(normalized);
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              return /^schemaVersion:\s*1(?:\n|$)/.test(normalized)
                && /skills\/brainstorming/.test(normalized)
                && !/^```/m.test(normalized)
                && !/^#/m.test(normalized)
                && normalized.trim().startsWith("schemaVersion:");
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const comparisonSection = normalized.match(/^comparison:\n([\s\S]*)$/m)?.[1] ?? "";
              return /^\s+- id:\s+codex-mini\s*$/m.test(normalized)
                && /^\s+adapter:\s+codex\s*$/m.test(normalized)
                && /^\s+model:\s+gpt-5\.1-codex-mini\s*$/m.test(normalized)
                && /^\s+sandboxMode:\s+danger-full-access\s*$/m.test(normalized)
                && /^\s+webSearchEnabled:\s+false\s*$/m.test(normalized)
                && /^\s+networkAccessEnabled:\s+true\s*$/m.test(normalized)
                && /^\s+executionMethod:\s+command\s*$/m.test(normalized)
                && /^\s+commandPath:\s+codex\s*$/m.test(normalized)
                && /^\s+variantDisplayName:\s+codex mini\s*$/m.test(normalized)
                && /^\s+repo:\s+https:\/\/github\.com\/obra\/superpowers(?:\.git)?\s*$/m.test(normalized)
                && /^\s+ref:\s+main\s*$/m.test(normalized)
                && /^\s+skillPath:\s+skills\/brainstorming\s*$/m.test(normalized)
                && /^\s+skillId:\s+brainstorming\s*$/m.test(normalized)
                && /^\s+strategy:\s+workspace-overlay\s*$/m.test(normalized)
                && /^\s+- id:\s+skill\s*$/m.test(comparisonSection)
                && /^\s+skills:\s*$/m.test(comparisonSection)
                && !/^\s+(agents|extensions|hooks|mcp|plugins):\s*$/m.test(comparisonSection);
    - id: sunday-brainstorming-compare-jurisdiction
      description: Generate a complete compare.yaml with isolated profiles.
      prompt: >-
        Create `deliverables/compare.yaml` for
        https://github.com/obra/superpowers/tree/main/skills/brainstorming.
        Ensure the file includes both `no-skill` and `skill` profiles,
        with `skill` installed from git via `workspace-overlay`.
        Return only valid YAML.
      evaluation:
        assertions:
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const comparisonSection = normalized.match(/^comparison:\n([\s\S]*)$/m)?.[1] ?? "";
              return /^\s+profiles:\s*$/m.test(normalized)
                && /^\s+- id:\s+no-skill\s*$/m.test(comparisonSection)
                && /^\s+- id:\s+skill\s*$/m.test(comparisonSection)
                && /^\s+inheritSystem:\s+false\s*$/m.test(comparisonSection)
                && /^\s+capabilities:\s+\{\}\s*$/m.test(comparisonSection)
                && /^\s+skills:\s*$/m.test(comparisonSection)
                && /^\s+type:\s+git\s*$/m.test(comparisonSection)
                && /^\s+strategy:\s+workspace-overlay\s*$/m.test(comparisonSection);
    - id: sunday-brainstorming-compare-multi-prompt
      description: Generate a compare.yaml that exercises prompt matrices and prompt-specific assertions.
      prompt: >-
        Create `deliverables/compare.yaml` for
        https://github.com/obra/superpowers/tree/main/skills/brainstorming.
        The generated compare must use exactly two `task.prompts` for a Sunday-only
        product brainstorming benchmark: one prompt that expects Markdown and another
        prompt that expects JSON. Use prompt-specific assertions to distinguish the two
        response formats. Return only valid YAML.
      evaluation:
        assertions:
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const promptSection = normalized.match(/^task:\n([\s\S]*?)(?=^workspace:\s*$)/m)?.[1] ?? "";
              const promptCount = (promptSection.match(/^\s+- id:\s+/gm) ?? []).length;
              const hasJsonPrompt =
                /-\s+id:\s+[^\n]*json[\s\S]*?type:\s+is-json\b/i.test(promptSection)
                || /\bjson\b[\s\S]*?type:\s+is-json\b/i.test(promptSection);
              const hasMarkdownPrompt =
                /-\s+id:\s+[^\n]*markdown[\s\S]*?type:\s+regex\b/i.test(promptSection)
                || /\bmarkdown\b[\s\S]*?type:\s+regex\b/i.test(promptSection);
              return promptCount === 2
                && hasJsonPrompt
                && hasMarkdownPrompt
                && !/type:\s+is-json\b[\s\S]*?\bmarkdown\b/i.test(promptSection);
    - id: local-skill-with-env
      description: Generate a compare.yaml with a local-path skill, two variants, and workspace env using $WORKSPACE.
      prompt: >-
        Create `deliverables/compare.yaml` for a benchmark called `local-env-bench`
        that evaluates a local skill at `fixtures/my-skill/overlay` with skillId `my-skill`.
        Use `local-path` as the skill source type with `workspace-overlay` install strategy.
        The workspace base fixture is at `fixtures/my-skill/base`.
        Add `workspace.setup.env` with a variable `TOOL_CONFIG` set to `$WORKSPACE/config/tool.json`.
        Include two profiles: `no-skill` with empty capabilities and `skill` with the local skill.
        Include two variants: `codex-mini` using adapter `codex` with model `gpt-5.1-codex-mini`
        and `pi-mini` using adapter `pi` with model `github-copilot/gpt-5-mini`.
        The codex variant should set `cliEnv` with `DATA_DIR` pointing to `$WORKSPACE/data`.
        Use one prompt that asks to summarize the repository.
        Return only valid YAML.
      evaluation:
        assertions:
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const comparisonSection = normalized.match(/^comparison:\n([\s\S]*)$/m)?.[1] ?? "";
              const workspaceSection = normalized.match(/^workspace:\n([\s\S]*?)(?=^evaluation:\s*$)/m)?.[1] ?? "";
              const variantIds = Array.from(
                comparisonSection.matchAll(/^\s+- id:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const hasCodexVariant = variantIds.includes("codex-mini");
              const hasPiVariant = variantIds.includes("pi-mini");
              const hasLocalPathSkill = /type:\s+local-path\b/.test(comparisonSection)
                && /skillId:\s+my-skill\b/.test(comparisonSection)
                && /strategy:\s+workspace-overlay\b/.test(comparisonSection);
              const hasWorkspaceEnv = /\$WORKSPACE\/config\/tool\.json/.test(workspaceSection)
                || /\$\{WORKSPACE\}\/config\/tool\.json/.test(workspaceSection);
              const hasCliEnv = /\$WORKSPACE\/data/.test(comparisonSection)
                || /\$\{WORKSPACE\}\/data/.test(comparisonSection);
              const hasAdapterPi = /adapter:\s+pi\b/.test(comparisonSection);
              const hasAdapterCodex = /adapter:\s+codex\b/.test(comparisonSection);
              return hasCodexVariant
                && hasPiVariant
                && hasLocalPathSkill
                && hasWorkspaceEnv
                && hasCliEnv
                && hasAdapterPi
                && hasAdapterCodex
                && /^\s+- id:\s+no-skill\s*$/m.test(comparisonSection)
                && /^\s+- id:\s+skill\s*$/m.test(comparisonSection);
    - id: inline-skill-copilot-judge
      description: Generate a compare.yaml with an inline-files skill, a copilot-cli variant, and llm-rubric with local judge.
      prompt: >-
        Create `deliverables/compare.yaml` for a benchmark called `inline-copilot-bench`.
        Use an `inline-files` skill source that defines `skills/greeter/SKILL.md` with
        content "Greet the user warmly." and skillId `greeter`, installed via `workspace-overlay`.
        The workspace base fixture is at `fixtures/inline-copilot/base`.
        Use one prompt asking the agent to greet the user.
        Include a shared `llm-rubric` assertion with provider `skill-arena:judge:copilot-cli`
        and value "Score 1.0 only if the output is a warm greeting."
        Also add a shared `contains` assertion checking for the word "hello".
        Include one variant `copilot-mini` using adapter `copilot-cli` with model `gpt-5.4-mini`,
        `executionMethod: command`, `commandPath: copilot`, `sandboxMode: workspace-write`,
        and `networkAccessEnabled: false`.
        Return only valid YAML.
      evaluation:
        assertions:
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const comparisonSection = normalized.match(/^comparison:\n([\s\S]*)$/m)?.[1] ?? "";
              const evaluationSection = normalized.match(/^evaluation:\n([\s\S]*?)(?=^comparison:\s*$)/m)?.[1] ?? "";
              const hasInlineFiles = /type:\s+inline-files\b/.test(comparisonSection);
              const hasSkillMd = /skills\/greeter\/SKILL\.md/.test(comparisonSection);
              const hasGreeterSkillId = /skillId:\s+greeter\b/.test(comparisonSection)
                || /skills\/greeter/.test(comparisonSection);
              const hasOverlay = /strategy:\s+workspace-overlay\b/.test(comparisonSection);
              const hasCopilotAdapter = /adapter:\s+copilot-cli\b/.test(comparisonSection);
              const hasCopilotModel = /model:\s+gpt-5\.4-mini\b/.test(comparisonSection);
              const hasWorkspaceWrite = /sandboxMode:\s+workspace-write\b/.test(comparisonSection);
              const hasJudge = /provider:\s+skill-arena:judge:copilot-cli\b/.test(evaluationSection);
              const hasLlmRubric = /type:\s+llm-rubric\b/.test(evaluationSection);
              const hasContains = /type:\s+contains\b/.test(evaluationSection);
              const hasNetworkFalse = /networkAccessEnabled:\s+false\b/.test(comparisonSection);
              return hasInlineFiles
                && hasSkillMd
                && hasGreeterSkillId
                && hasOverlay
                && hasCopilotAdapter
                && hasCopilotModel
                && hasWorkspaceWrite
                && hasJudge
                && hasLlmRubric
                && hasContains
                && hasNetworkFalse;
    - id: multi-profile-file-contains
      description: Generate a compare.yaml with three profiles and a file-contains assertion.
      prompt: >-
        Create `deliverables/compare.yaml` for a benchmark called `three-profile-bench`.
        The workspace base fixture is at `fixtures/three-profile/base`.
        Use one prompt asking the agent to write a summary to `output/summary.txt`.
        Include a shared `file-contains` assertion checking that `output/summary.txt`
        contains the word "complete".
        Define three profiles: `baseline` with empty capabilities, `skill-a` with a
        local-path skill at `fixtures/skills/analyzer` (skillId `analyzer`), and
        `skill-b` with a local-path skill at `fixtures/skills/reporter` (skillId `reporter`).
        Both skill profiles use `workspace-overlay`.
        Include one variant `codex-mini` using adapter `codex` with model `gpt-5.1-codex-mini`
        and `sandboxMode: workspace-write`.
        Return only valid YAML.
      evaluation:
        assertions:
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              const comparisonSection = normalized.match(/^comparison:\n([\s\S]*)$/m)?.[1] ?? "";
              const evaluationSection = normalized.match(/^evaluation:\n([\s\S]*?)(?=^comparison:\s*$)/m)?.[1] ?? "";
              const profileIds = Array.from(
                comparisonSection.matchAll(/^\s+- id:\s+([A-Za-z0-9-]+)\s*$/gm),
                (match) => match[1],
              );
              const hasThreeProfiles = profileIds.includes("baseline")
                && profileIds.includes("skill-a")
                && profileIds.includes("skill-b");
              const hasFileContains = /type:\s+file-contains\b/.test(evaluationSection);
              const hasOutputPath = /path:\s+output\/summary\.txt\b/.test(evaluationSection)
                || /output\/summary\.txt/.test(evaluationSection);
              const hasContainsComplete = /complete/.test(evaluationSection);
              const hasAnalyzerSkill = /skillId:\s+analyzer\b/.test(comparisonSection)
                && /fixtures\/skills\/analyzer/.test(comparisonSection);
              const hasReporterSkill = /skillId:\s+reporter\b/.test(comparisonSection)
                && /fixtures\/skills\/reporter/.test(comparisonSection);
              const hasWorkspaceWrite = /sandboxMode:\s+workspace-write\b/.test(comparisonSection);
              const hasBothOverlays = (comparisonSection.match(/strategy:\s+workspace-overlay\b/g) ?? []).length >= 2;
              const hasBaselineEmpty = /- id:\s+baseline[\s\S]*?capabilities:\s+\{\}/m.test(comparisonSection);
              return hasThreeProfiles
                && hasFileContains
                && hasOutputPath
                && hasContainsComplete
                && hasAnalyzerSkill
                && hasReporterSkill
                && hasWorkspaceWrite
                && hasBothOverlays
                && hasBaselineEmpty;
workspace:
  sources:
    - id: base
      type: local-path
      path: evaluations/skill-arena-config-author/fixtures/workspaces/base
      target: /
  setup:
    initializeGit: true
    env: {}
evaluation:
  assertions:
    - type: regex
      value: "^schemaVersion:\\s*1(?:\\r?\\n|$)"
    - type: javascript
      value: |
        const normalized = output.replace(/\r\n/g, "\n");
        const topLevelKeys = Array.from(
          normalized.matchAll(/^([A-Za-z][A-Za-z0-9-]*):/gm),
          (match) => match[1],
        );
        const workspaceSourceMatch = normalized.match(
          /^workspace:\n  sources:\n    - (?:id: [^\n]+\n      )?type: local-path\n      path: ([^\n]+)\n      target: \//m,
        );
        const workspacePathValue = workspaceSourceMatch?.[1]?.trim() ?? "";
        const hasRuntimeRelativeWorkspace =
          Boolean(workspaceSourceMatch)
          && workspacePathValue.length > 0
          && !/^([A-Za-z]:[\\/]|\/)/.test(workspacePathValue);
        const evaluationSection = normalized.match(/^evaluation:\n([\s\S]*?)(?=^comparison:\s*$)/m)?.[1] ?? "";
        const comparisonSection = normalized.match(/^comparison:\n([\s\S]*)$/m)?.[1] ?? "";
        const forbiddenPatterns = [
          /^\s*```[A-Za-z0-9-]*\s*$/m,
          /^task:\n  prompts:\n    [\w-]+:\s*$/m,
          /^\s+shared:\s*$/m,
          /^\s+enabled:\s+(true|false)\s*$/m,
          /^\s+template:\s*[|>]/m,
          /^\s+instructions:\s*[|>]/m,
          /^\s+responseFormat:\s*$/m,
          /^\s+text:\s*[|>]/m,
          /^\s+pattern:\s+/m,
          /^\s+rubric:\s*[|>]/m,
        ];
        return JSON.stringify(topLevelKeys) === JSON.stringify([
          "schemaVersion",
          "benchmark",
          "task",
          "workspace",
          "evaluation",
          "comparison",
        ])
          && /^task:\n  prompts:\n    - id:\s+[\w-]+/m.test(normalized)
          && hasRuntimeRelativeWorkspace
          && /^evaluation:\n  assertions:\n/m.test(normalized)
          && /^\s+requests:\s+\d+\s*$/m.test(evaluationSection)
          && /^\s+capabilities:\s+\{\}\s*$/m.test(normalized)
          && /^\s+profiles:\s*$/m.test(normalized)
          && /^\s+variants:\s*$/m.test(normalized)
          && /^\s+inheritSystem:\s+false\s*$/m.test(comparisonSection)
          && !/comparison:\n  skillModes:/m.test(normalized)
          && !/^\s+-\s+local-path:\s*$/m.test(normalized)
          && !/^\s+approval:\s+/m.test(comparisonSection)
          && forbiddenPatterns.every((pattern) => !pattern.test(normalized));
  requests: 8
  timeoutMs: 1200000
  tracing: false
  maxConcurrency: 8
  noCache: true
comparison:
  profiles:
    - id: no-skill
      description: Fully isolated baseline without the brainstorming skill.
      isolation:
        inheritSystem: false
      capabilities: {}
    - id: skill
      description: Compare-authoring profile with only the local skill-arena-config-author skill enabled.
      isolation:
        inheritSystem: false
      capabilities:
        skills:
          - source:
              type: local-path
              path: skills/skill-arena-config-author
              skillId: skill-arena-config-author
            install:
              strategy: workspace-overlay
      output:
        tags:
          - skill
        labels:
          skillDisplayName: skill
          skillModeId: skill
  variants:
    - id: codex-mini
      description: gpt-5.1-codex-mini authoring variant.
      agent:
        adapter: codex
        model: gpt-5.1-codex-mini
        executionMethod: command
        commandPath: codex
        sandboxMode: danger-full-access
        approvalPolicy: never
        webSearchEnabled: false
        networkAccessEnabled: true
        reasoningEffort: low
        additionalDirectories: []
        cliEnv: {}
        config: {}
      output:
        tags:
          - codex
          - mini
        labels:
          variantDisplayName: codex mini
