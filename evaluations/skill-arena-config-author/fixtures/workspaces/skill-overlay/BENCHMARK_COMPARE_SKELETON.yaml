schemaVersion: 1
benchmark:
  id: gws-calendar-agenda-compare-generated
  description: Compare Codex mini on Google Calendar agenda requests with and without the remote gws-calendar-agenda skill.
  tags:
    - compare
    - calendar
    - gws
    - codex
task:
  prompts:
    - id: today-json
      description: Request today's agenda across all calendars with a JSON-only response.
      prompt: >-
        Prefer the underlying `gws calendar +agenda` command in read-only mode.
        Return today's agenda across all calendars as JSON only.
      evaluation:
        assertions:
          - type: is-json
    - id: week-markdown
      description: Request this week's agenda across all calendars with a Markdown-only response.
      prompt: >-
        Prefer the underlying `gws calendar +agenda` command in read-only mode.
        Return this week's agenda across all calendars as Markdown only.
      evaluation:
        assertions:
          - type: regex
            value: (?m)^#{1,6}\s
workspace:
  sources:
    - type: local-path
      path: evaluations/gws-calendar-agenda-compare/fixtures/workspaces/base
      target: /
  setup:
    initializeGit: true
evaluation:
  assertions:
    - type: llm-rubric
      provider: skill-arena:judge:codex
      value: >-
        Score 1.0 only if the answer is raw YAML for a valid Skill Arena
        compare config that uses the exact benchmark id, the required
        runtime-relative workspace path, the two required prompts, valid
        comparison skill modes, and valid Codex mini agent settings with no
        commentary before or after the YAML.
  requests: 2
  timeoutMs: 1200000
  maxConcurrency: 1
comparison:
  skillModes:
    - id: no-skill
      description: Baseline without the remote skill.
      skillMode: disabled
    - id: skill
      description: Skill-enabled run with the remote gws-calendar-agenda skill.
      skillMode: enabled
      skill:
        source:
          type: git
          repo: https://github.com/googleworkspace/cli.git
          ref: main
          subpath: .
          skillPath: skills/gws-calendar-agenda
          skillId: gws-calendar-agenda
        install:
          strategy: workspace-overlay
  variants:
    - id: codex-mini
      description: Codex mini comparison variant.
      agent:
        adapter: codex
        model: gpt-5.1-codex-mini
        executionMethod: command
        commandPath: codex
        sandboxMode: danger-full-access
        approvalPolicy: never
        webSearchEnabled: false
        networkAccessEnabled: true
        reasoningEffort: low
      output:
        labels:
          variantDisplayName: codex mini
