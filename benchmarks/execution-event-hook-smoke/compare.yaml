schemaVersion: 1
benchmark:
  id: execution-event-hook-smoke
  description: Verify that provider execution-event hooks capture observable tool usage while agents inspect a small workspace.
  tags:
    - compare
    - hook
    - observability
    - smoke
task:
  prompts:
    - id: inspect-workspace-with-tools
      description: Force file inspection and count visible files.
      prompt: >-
        Use tools to inspect the working directory. Read `alpha.txt` and
        `nested/beta.json` from disk. Return exactly this JSON object and
        nothing else:
        `{"alphaFirstLine":"...","answer":0,"fileCount":0}`.
        Do not guess. Compute `fileCount` from the visible files in the
        working directory tree.
      evaluation:
        assertions:
          - type: is-json
          - type: javascript
            value: |
              try {
                const parsed = JSON.parse(output);
                return parsed.alphaFirstLine === "ALPHA-LINE-1"
                  && parsed.answer === 42
                  && parsed.fileCount === 3;
              } catch {
                return false;
              }
workspace:
  sources:
    - id: base
      type: local-path
      path: fixtures/execution-event-hook-smoke/base
      target: /
  setup:
    initializeGit: true
evaluation:
  assertions:
    - type: javascript
      value: |
        try {
          const parsed = JSON.parse(output);
          return typeof parsed.alphaFirstLine === "string"
            && typeof parsed.answer === "number"
            && typeof parsed.fileCount === "number";
        } catch {
          return false;
        }
  requests: 1
  timeoutMs: 240000
  tracing: false
  maxConcurrency: 1
  noCache: true
comparison:
  profiles:
    - id: no-skill
      description: Fully isolated control without extra capabilities.
      isolation:
        inheritSystem: false
      capabilities: {}
  variants:
    - id: codex-mini
      description: Codex command execution with observable shell usage.
      agent:
        adapter: codex
        model: gpt-5.4
        executionMethod: command
        commandPath: codex
        sandboxMode: danger-full-access
        approvalPolicy: never
        webSearchEnabled: false
        networkAccessEnabled: true
        reasoningEffort: medium
        additionalDirectories: []
        cliEnv: {}
        config: {}
      output:
        labels:
          variantDisplayName: codex
    - id: copilot-gpt-5-4-mini
      description: Copilot CLI execution with emitted tool events.
      agent:
        adapter: copilot-cli
        model: gpt-5.4-mini
        executionMethod: command
        commandPath: copilot
        sandboxMode: danger-full-access
        approvalPolicy: never
        webSearchEnabled: false
        networkAccessEnabled: true
        reasoningEffort: low
        additionalDirectories: []
        cliEnv: {}
        config: {}
      output:
        labels:
          variantDisplayName: copilot
