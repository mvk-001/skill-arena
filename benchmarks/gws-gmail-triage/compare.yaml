schemaVersion: 1
benchmark:
  id: gws-gmail-triage-compare
  description: Compare Gmail triage behavior with and without the system skill.
  tags:
    - gmail
    - triage
    - compare
task:
  prompt: Summarize the best next Gmail triage action.
workspace:
  fixture: fixtures/remote-gws-gmail-triage/base
  initializeGit: true
evaluation:
  assertions:
    - type: contains
      value: Gmail
  requests: 10
  timeoutMs: 120000
  tracing: false
  maxConcurrency: 4
  noCache: true
comparison:
  skillModes:
    - id: no-skill
      description: Baseline without the Gmail triage skill.
      skillMode: disabled
    - id: skill
      description: Run with system-installed Gmail triage skill.
      skillMode: enabled
      skill:
        source:
          type: system-installed
        install:
          strategy: system-installed
  variants:
    - id: codex-worst
      description: Codex worst-case scenario comparison variant.
      agent:
        adapter: codex
        model: gpt-5.1-codex-mini
        executionMethod: command
        commandPath: codex
        sandboxMode: danger-full-access
        approvalPolicy: never
        webSearchEnabled: true
        networkAccessEnabled: true
        reasoningEffort: low
    - id: pi-worst
      description: PI worst-case scenario comparison variant.
      agent:
        adapter: pi
        model: github-copilot/gpt-5-mini
        executionMethod: command
        commandPath: pi
        sandboxMode: danger-full-access
        approvalPolicy: never
        webSearchEnabled: false
        networkAccessEnabled: true
        reasoningEffort: low
