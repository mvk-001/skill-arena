schemaVersion: 1
benchmark:
  id: recursive-log-analyzer-compare
  description: Compare recursive log analysis behavior with and without the recursive-log-analyzer skill.
  tags:
    - compare
    - skill
    - logs
    - analyzer
task:
  prompts:
    - id: analyze-service-log
      description: Build a JSON analysis artifact for the service log.
      prompt: >-
        Use the recursive-log-analyzer workflow on `logs/service.log` with
        `--max-lines 4 --min-lines 2 --top-k 3`, and return only the JSON
        analysis artifact. Do not add markdown fences or commentary.
workspace:
  sources:
    - id: base
      type: local-path
      path: fixtures/recursive-log-analyzer-compare/base
      target: /
  setup:
    initializeGit: true
evaluation:
  assertions:
    - type: is-json
    - type: javascript
      value: |
        const data = JSON.parse(output);
        const expectedPatternTotals = {
          error: 2,
          warning: 3,
          exception: 1,
          traceback: 1,
          failure: 4,
          timeout: 1,
        };
        const expectedDominantSignals = [
          ["failure", 4],
          ["warning", 3],
          ["error", 2],
        ];
        const sameObject = (actual, expected) =>
          JSON.stringify(actual) === JSON.stringify(expected);
        const sameCounts = (actual, expected) =>
          Boolean(actual)
          && typeof actual === "object"
          && !Array.isArray(actual)
          && Object.keys(actual).length === Object.keys(expected).length
          && Object.entries(expected).every(([key, value]) => actual[key] === value);
        return Array.isArray(data.hotspots)
          && sameObject(Object.keys(data).sort(), ["hotspots", "metadata", "root", "summary"])
          && data.metadata?.source_lines === 12
          && data.metadata?.max_lines === 4
          && data.metadata?.min_lines === 2
          && data.metadata?.top_k === 3
          && data.summary?.total_lines === 12
          && data.summary?.leaf_nodes >= 1
          && data.summary?.total_anomaly_score === 44
          && sameCounts(data.summary?.pattern_totals, expectedPatternTotals)
          && sameObject(data.summary?.dominant_signals, expectedDominantSignals)
          && data.root?.id === "root"
          && data.root?.line_start === 1
          && data.root?.line_end === 12
          && data.root?.line_count === 12
          && data.root?.anomaly_score === 44
          && sameCounts(data.root?.pattern_counts, expectedPatternTotals)
          && data.hotspots.length >= 1
          && data.hotspots.length <= 3;
  requests: 2
  timeoutMs: 300000
  tracing: false
  maxConcurrency: 4
  noCache: true
comparison:
  profiles:
    - id: no-skill
      description: Fully isolated baseline without the recursive-log-analyzer skill.
      isolation:
        inheritSystem: false
      capabilities: {}
      output:
        tags:
          - baseline
        labels:
          skill_state: off
    - id: skill
      description: Profile with only the declared recursive-log-analyzer skill enabled.
      isolation:
        inheritSystem: false
      capabilities:
        skills:
          - source:
              type: local-path
              path: fixtures/recursive-log-analyzer-compare/skill-overlay/skills/recursive-log-analyzer
              skillId: recursive-log-analyzer
            install:
              strategy: workspace-overlay
      output:
        tags:
          - skill
        labels:
          skill_state: on
  variants:
    - id: codex-mini
      description: Codex command backend with the mini coding model.
      agent:
        adapter: codex
        model: gpt-5.1-codex-mini
        executionMethod: command
        commandPath: codex
        sandboxMode: read-only
        approvalPolicy: never
        webSearchEnabled: false
        networkAccessEnabled: false
        reasoningEffort: low
        additionalDirectories: []
        cliEnv: {}
        config: {}
      output:
        tags:
          - codex
          - mini
        labels:
          variantDisplayName: codex mini
