schemaVersion: 1
benchmark:
  id: gws-calendar-agenda-compare
  description: Compare PI GPT-5 Mini on Google Calendar agenda requests with and without the remote gws-calendar-agenda skill.
  tags:
    - calendar
    - gws
    - compare
task:
  prompts:
    - id: today-events
      description: Ask for today's events.
      prompt: >-
        Show today's events across all calendars. Use the underlying
        `gws calendar +agenda` command in read-only mode, prefer `--format
        json`, and return only JSON with top-level keys `request`,
        `commandUsed`, `events`, `eventCount`, and `notes`.
    - id: week-events-ny
      description: Ask for this week's events in New York time.
      prompt: >-
        Show this week's events across all calendars in the
        `America/New_York` timezone. Use the underlying `gws calendar +agenda`
        command in read-only mode, prefer `--format json`, and return only
        JSON with top-level keys `request`,
        `commandUsed`, `events`, `eventCount`, and `notes`.
workspace:
  fixture: fixtures/gws-calendar-agenda-compare/base
  skillOverlay:
    git:
      repo: https://github.com/googleworkspace/cli.git
      ref: main
      subpath: skills
  initializeGit: true
evaluation:
  assertions:
    - type: is-json
    - type: javascript
      value: >-
        (() => { const data = JSON.parse(output); return typeof data.request ===
        'string' && typeof data.commandUsed === 'string' &&
        data.commandUsed.includes('gws calendar +agenda') &&
        Array.isArray(data.events) && typeof data.eventCount === 'number' &&
        data.eventCount === data.events.length && typeof data.notes ===
        'string'; })()
  requests: 10
  timeoutMs: 1200000
  tracing: false
  maxConcurrency: 1
  noCache: true
comparison:
  skillModes:
    - id: no-skill
      description: Baseline without the remote calendar agenda skill.
      skillMode: disabled
      output:
        tags:
          - baseline
        labels:
          skill_state: off
    - id: skill
      description: Remote Git overlay with gws-calendar-agenda enabled.
      skillMode: enabled
      skill:
        source:
          type: git
          repo: https://github.com/googleworkspace/cli.git
          ref: main
          subpath: skills
        install:
          strategy: workspace-overlay
      output:
        tags:
          - skill
        labels:
          skill_state: on
  variants:
    - id: pi-gpt5mini
      description: PI using GitHub Copilot GPT-5 Mini through the local CLI.
      agent:
        adapter: pi
        model: github-copilot/gpt-5-mini
        executionMethod: command
        commandPath: pi
        sandboxMode: danger-full-access
        approvalPolicy: never
        webSearchEnabled: false
        networkAccessEnabled: true
        reasoningEffort: low
        additionalDirectories: []
        cliEnv: {}
        config: {}
      output:
        tags:
          - pi
          - mini
        labels:
          variantDisplayName: pi gpt-5 mini
