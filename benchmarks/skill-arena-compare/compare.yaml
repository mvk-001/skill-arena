schemaVersion: 1
benchmark:
  id: skill-arena-compare
  description: Evaluate the skill-arena-compare workspace skill on authoring a Skill Arena compare.yaml file.
  tags:
    - compare
    - skill
    - authoring
task:
  prompts:
    - id: brief-driven
      description: Author the compare config from the benchmark brief and write it into the current workspace.
      prompt: >-
        Read `docs/benchmark-brief.md` and author `./deliverables/compare.yaml`
        in the current workspace. Write the file there instead of inside any
        `skills/` directory. Update the generated compare config so each prompt
        uses `evaluation.requests: 5`. If you can determine local machine
        capacity from Node.js, set `evaluation.maxConcurrency` in the generated
        file. Return only the full completed `compare.yaml` content as your
        final answer.
    - id: workspace-path
      description: Reinforce writing to the requested workspace path and keeping the compare config concise.
      prompt: >-
        Create `deliverables/compare.yaml` in the current workspace using the
        requirements in `docs/benchmark-brief.md`. Keep the YAML concise, write
        the file at the requested path, and do not place the output under the
        skill source tree. Use `evaluation.requests: 5` in the generated file
        and include `evaluation.maxConcurrency` when you can compute it from the
        local machine. Return only the final `compare.yaml` content.
workspace:
  fixture: fixtures/skill-arena-compare/base
  skillOverlay: fixtures/skill-arena-compare/skill-overlay
  initializeGit: true
evaluation:
  assertions:
    - type: contains
      value: "schemaVersion: 1"
    - type: contains
      value: "id: repo-summary-generated"
    - type: contains
      value: "fixture: fixtures/repo-summary/base"
    - type: contains
      value: "path: fixtures/repo-summary/skill-overlay"
    - type: contains
      value: "requests: 5"
    - type: contains
      value: "maxConcurrency:"
    - type: contains
      value: "id: no-skill"
    - type: contains
      value: "id: skill"
    - type: contains
      value: "skillSource: workspace-overlay"
    - type: contains
      value: "id: architecture"
    - type: contains
      value: "id: testing"
    - type: contains
      value: "variantDisplayName: codex mini"
    - type: file-contains
      path: "deliverables/compare.yaml"
      value: "schemaVersion: 1"
    - type: file-contains
      path: "deliverables/compare.yaml"
      value: "requests: 5"
    - type: file-contains
      path: "deliverables/compare.yaml"
      value: "maxConcurrency:"
    - type: file-contains
      path: "deliverables/compare.yaml"
      value: "skillSource: workspace-overlay"
    - type: javascript
      value: |
        !output.includes("compare-config-author")
    - type: javascript
      value: |
        !output.includes("skills/skill-arena-compare")
  requests: 5
  timeoutMs: 300000
  tracing: false
  maxConcurrency: 10
  noCache: true
comparison:
  skillModes:
    - id: no-skill
      description: Baseline without the skill-arena-compare skill overlay.
      skillMode: disabled
      output:
        tags:
          - baseline
        labels:
          skillDisplayName: no-skill
          skillModeId: no-skill
    - id: skill
      description: Workspace overlay with the skill-arena-compare skill enabled.
      skillMode: enabled
      skillSource: workspace-overlay
      output:
        tags:
          - skill
        labels:
          skillDisplayName: skill
          skillModeId: skill
  variants:
    - id: codex-mini
      description: Codex mini using workspace-write so it can author the target file.
      agent:
        adapter: codex
        model: gpt-5.1-codex-mini
        executionMethod: command
        commandPath: codex
        sandboxMode: workspace-write
        approvalPolicy: never
        webSearchEnabled: false
        networkAccessEnabled: false
        reasoningEffort: low
        additionalDirectories: []
        cliEnv: {}
        config: {}
      output:
        tags:
          - codex
          - mini
        labels:
          variantDisplayName: codex mini
