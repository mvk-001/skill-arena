schemaVersion: 1
benchmark:
  id: skill-arena-compare
  description: Evaluate the repo-local skill-arena-compare workspace skill on authoring correct Skill Arena compare configs.
  tags:
    - compare
    - skill
    - authoring
task:
  prompts:
    - id: local-path-skill
      description: Author the compare config from the benchmark brief using an explicit local-path workspace-overlay skill source.
      prompt: >-
        Read `docs/benchmark-brief.md` and author `./deliverables/compare.yaml`
        in the current workspace. Write the file there instead of inside any
        `skills/` directory. The generated compare config must stay focused on
        correct prompts, explicit evaluation, one codex variant, and explicit
        `no-skill` and `skill` modes. For the enabled `skill` mode in the
        generated compare config, use an explicit `skill` block with
        `source.type: local-path`, `path:
        fixtures/skill-arena-compare/skill-overlay/skills/skill-arena-compare`,
        `skillId: skill-arena-compare`, and `install.strategy:
        workspace-overlay`. Return only the full completed `compare.yaml`
        content as your final answer.
      evaluation:
        assertions:
          - type: contains
            value: "type: local-path"
          - type: contains
            value: "path: fixtures/skill-arena-compare/skill-overlay/skills/skill-arena-compare"
          - type: contains
            value: "skillId: skill-arena-compare"
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              return normalized.includes("type: local-path")
                && normalized.includes("path: fixtures/skill-arena-compare/skill-overlay/skills/skill-arena-compare")
                && normalized.includes("skillId: skill-arena-compare")
                && !normalized.includes("type: git")
                && !normalized.includes("type: inline-files");
    - id: inline-files-skill
      description: Author the compare config from the benchmark brief using an inline-files workspace-overlay skill source.
      prompt: >-
        Read `docs/benchmark-brief.md` and author `./deliverables/compare.yaml`
        in the current workspace. Write the file there instead of inside any
        `skills/` directory. The generated compare config must stay focused on
        correct prompts, explicit evaluation, one codex variant, and explicit
        `no-skill` and `skill` modes. For the enabled `skill` mode in the
        generated compare config, use an explicit `skill` block with
        `source.type: inline-files` and files that define at least
        `skills/skill-arena-compare/SKILL.md`. Keep `install.strategy:
        workspace-overlay`. Return only the full completed `compare.yaml`
        content as your final answer.
      evaluation:
        assertions:
          - type: contains
            value: "type: inline-files"
          - type: contains
            value: "path: skills/skill-arena-compare/SKILL.md"
          - type: contains
            value: "name: skill-arena-compare"
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              return normalized.includes("type: inline-files")
                && normalized.includes("path: skills/skill-arena-compare/SKILL.md")
                && normalized.includes("name: skill-arena-compare")
                && !normalized.includes("type: git")
                && !normalized.includes("type: local-path");
    - id: git-skill
      description: Author the compare config from the benchmark brief using a git workspace-overlay skill source.
      prompt: >-
        Read `docs/benchmark-brief.md` and author `./deliverables/compare.yaml`
        in the current workspace. Write the file there instead of inside any
        `skills/` directory. The generated compare config must stay focused on
        correct prompts, explicit evaluation, one codex variant, and explicit
        `no-skill` and `skill` modes. For the enabled `skill` mode in the
        generated compare config, use an explicit `skill` block with
        `source.type: git`, `repo: https://github.com/mvk-001/skill-arena`,
        `ref: main`, `subpath: .`, `skillPath: skills/skill-arena-compare`,
        `skillId: skill-arena-compare`, and `install.strategy:
        workspace-overlay`. Return only the full completed `compare.yaml`
        content as your final answer.
      evaluation:
        assertions:
          - type: contains
            value: "type: git"
          - type: contains
            value: "repo: https://github.com/mvk-001/skill-arena"
          - type: contains
            value: "skillPath: skills/skill-arena-compare"
          - type: contains
            value: "skillId: skill-arena-compare"
          - type: javascript
            value: |
              const normalized = output.replace(/\r\n/g, "\n");
              return normalized.includes("type: git")
                && normalized.includes("repo: https://github.com/mvk-001/skill-arena")
                && normalized.includes("skillPath: skills/skill-arena-compare")
                && normalized.includes("skillId: skill-arena-compare")
                && !normalized.includes("type: local-path")
                && !normalized.includes("type: inline-files");
workspace:
  fixture: fixtures/skill-arena-compare/base
  initializeGit: true
evaluation:
  assertions:
    - type: contains
      value: "schemaVersion: 1"
    - type: contains
      value: "comparison:"
    - type: contains
      value: "id: compare-config-authoring-generated"
    - type: contains
      value: "description: Compare baseline and skill-enabled compare.yaml authoring runs."
    - type: contains
      value: "fixture: fixtures/skill-arena-compare/base"
    - type: contains
      value: "type: llm-rubric"
    - type: contains
      value: "provider: skill-arena:judge:codex"
    - type: contains
      value: "id: no-skill"
    - type: contains
      value: "id: skill"
    - type: contains
      value: "strategy: workspace-overlay"
    - type: contains
      value: "id: author-compare"
    - type: contains
      value: "id: review-compare"
    - type: contains
      value: "skillMode: disabled"
    - type: contains
      value: "skillMode: enabled"
    - type: contains
      value: "executionMethod: command"
    - type: contains
      value: "commandPath: codex"
    - type: contains
      value: "variantDisplayName: codex mini"
    - type: contains
      value: "requests: 3"
    - type: contains
      value: "maxConcurrency: 12"
    - type: contains
      value: "sandboxMode: workspace-write"
    - type: contains
      value: "approvalPolicy: never"
    - type: contains
      value: "webSearchEnabled: false"
    - type: contains
      value: "networkAccessEnabled: false"
    - type: contains
      value: "reasoningEffort: low"
    - type: contains
      value: "model: gpt-5.1-codex-mini"
    - type: file-contains
      path: deliverables/compare.yaml
      value: "schemaVersion: 1"
    - type: file-contains
      path: deliverables/compare.yaml
      value: "comparison:"
    - type: javascript
      value: 'output.trimStart().startsWith("schemaVersion: 1")'
    - type: javascript
      value: "!output.includes('```')"
    - type: javascript
      value: |
        const normalized = output.replace(/\r\n/g, "\n");
        return normalized.includes("\ntask:\n")
          && normalized.includes("\n  prompts:\n")
          && /-\s+id:\s+author-compare\b/.test(normalized)
          && /-\s+id:\s+review-compare\b/.test(normalized)
          && normalized.includes("Read docs/benchmark-brief.md and author deliverables/compare.yaml in the workspace. Return only the completed compare.yaml content.")
          && normalized.includes("Review the generated compare.yaml for correct prompts, agent settings, evaluation rules, and explicit skill and no-skill configuration. Return only a short validation summary.")
          && normalized.includes("\ncomparison:\n")
          && !/\nbenchmarks:\n/.test(normalized)
          && !/\ntasks:\n/.test(normalized)
          && !/\nvariants:\n/.test(normalized)
          && !/\nskillModes:\n/.test(normalized)
          && !/\nmodes:\n/.test(normalized)
          && !/\nllm-rubric:\n/.test(normalized)
          && !/llmRubric:/.test(normalized)
          && !/\n\s+author-compare:\s/.test(normalized)
          && !/\n\s+review-compare:\s/.test(normalized);
  requests: 3
  timeoutMs: 300000
  tracing: false
  maxConcurrency: 12
  noCache: true
comparison:
  skillModes:
    - id: no-skill
      description: Baseline without the skill-arena-compare authoring skill.
      skillMode: disabled
      output:
        tags:
          - baseline
        labels:
          skillDisplayName: no-skill
          skillModeId: no-skill
    - id: skill
      description: Workspace overlay with the repo-local skill-arena-compare skill enabled.
      skillMode: enabled
      skill:
        source:
          type: local-path
          path: skills/skill-arena-compare
          skillId: skill-arena-compare
        install:
          strategy: workspace-overlay
      output:
        tags:
          - skill
        labels:
          skillDisplayName: skill
          skillModeId: skill
  variants:
    - id: codex-mini
      description: Codex mini using danger-full-access so Windows Codex can run shell tools in the isolated authoring workspace.
      agent:
        adapter: codex
        model: gpt-5.1-codex-mini
        executionMethod: command
        commandPath: codex
        sandboxMode: danger-full-access
        approvalPolicy: never
        webSearchEnabled: false
        networkAccessEnabled: true
        reasoningEffort: low
        additionalDirectories: []
        cliEnv: {}
        config: {}
      output:
        tags:
          - codex
          - mini
        labels:
          variantDisplayName: codex mini
