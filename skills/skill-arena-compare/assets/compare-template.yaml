schemaVersion: 1
benchmark:
  id: example-compare
  description: Short human-readable description.
  tags:
    - compare
task:
  prompts:
    - id: main
      description: Primary benchmark prompt
      prompt: Exact task prompt sent to every provider.
      # Keep prompts as a YAML list of prompt objects.
      # Do not rewrite this into a mapping like `main: ...`.
      # Preserve exact prompt ids from the benchmark brief when they are given.
      # Optional prompt-level assertions for row-specific checks.
      # evaluation:
      #   assertions:
      #     - type: contains
      #       value: Prompt-specific expectation.
workspace:
  sources:
    - id: base
      type: local-path
      path: fixtures/example/base
      target: /
  setup:
    initializeGit: true
evaluation:
  assertions:
    - type: llm-rubric
      provider: skill-arena:judge:codex
      value: Score 1.0 only if the answer satisfies the benchmark goal.
  # Keep shared assertions here. Format-specific checks belong under the prompt.
  requests: 10
  timeoutMs: 180000
  tracing: false
  # Prefer floor(0.8 * available machine parallelism) when authoring on a specific machine.
  maxConcurrency: 1
  noCache: true
comparison:
  skillModes:
    - id: no-skill
      description: Baseline without the skill.
      skillMode: disabled
    - id: skill
      description: Skill-enabled run.
      skillMode: enabled
      skill:
        source:
          type: git
          repo: https://github.com/example/repo.git
          ref: main
          subpath: .
          skillPath: skills/example-skill
          skillId: example-skill
        install:
          strategy: workspace-overlay
  variants:
    - id: codex-mini
      description: Codex mini comparison variant.
      agent:
        adapter: codex
        model: gpt-5.1-codex-mini
        executionMethod: command
        commandPath: codex
        sandboxMode: workspace-write
        approvalPolicy: never
        webSearchEnabled: false
        networkAccessEnabled: false
        reasoningEffort: low
        additionalDirectories: []
        cliEnv: {}
        config: {}
      output:
        labels:
          variantDisplayName: codex mini
