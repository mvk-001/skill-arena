schemaVersion: 1
benchmark:
  id: example-compare
  description: Short human-readable description.
  tags:
    - compare
task:
  prompts:
    - id: prompt-id
      prompt: Exact task prompt sent to every provider.
      # Keep prompts in this list. Do not rewrite `task.prompts` into a mapping.
      # Put row-only checks here. Shared checks stay under top-level `evaluation`.
workspace:
  sources:
    - id: base
      type: local-path
      path: fixtures/example/base
      target: /
  setup:
    initializeGit: true
evaluation:
  assertions:
    - type: llm-rubric
      provider: skill-arena:judge:codex
      value: Score 1.0 only if the answer satisfies the benchmark goal.
  # Keep only shared assertions here. Do not use `shared:`.
  requests: 10
  timeoutMs: 180000
  tracing: false
  maxConcurrency: 1
  noCache: true
comparison:
  profiles:
    - id: baseline
      description: Fully isolated control.
      isolation:
        inheritSystem: false
      capabilities: {}
    - id: skill
      description: Skill-enabled profile.
      isolation:
        inheritSystem: false
      capabilities:
        skills:
          - source:
              type: git
              repo: https://github.com/example/repo.git
              ref: main
              subpath: .
              skillPath: skills/example-skill
              skillId: example-skill
            install:
              strategy: workspace-overlay
  variants:
    - id: codex-mini
      description: Codex mini comparison variant.
      agent:
        adapter: codex
        model: gpt-5.1-codex-mini
        # Do not rename these keys to `execution`, `sandbox`, `webSearch`, or `networkAccess`.
        executionMethod: command
        commandPath: codex
        sandboxMode: workspace-write
        approvalPolicy: never
        webSearchEnabled: false
        networkAccessEnabled: false
        reasoningEffort: low
        additionalDirectories: []
        cliEnv: {}
        config: {}
      output:
        labels:
          variantDisplayName: codex mini
